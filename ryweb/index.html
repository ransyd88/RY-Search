<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RY Premium Dashboard</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-heavy: rgba(255, 255, 255, 0.3);
            --text-main: #1d1d1f;
            --accent: #ff8fa3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            /* 更有质感的极简渐变 */
            background: radial-gradient(circle at top left, #fce4ec, #e3f2fd 40%, #f3e5f5 100%);
            overflow: hidden;
            color: var(--text-main);
        }

        .container {
            width: 95vw;
            max-width: 1400px;
            height: 85vh;
            display: grid;
            grid-template-columns: 350px 1fr 380px; /* 三栏布局：时间天气 | 日历 | 功能进度 */
            gap: 30px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }

        /* 第一栏：时间与精致天气 */
        .left-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #time-now {
            font-size: 90px;
            font-weight: 200;
            letter-spacing: -4px;
            margin: 0;
            line-height: 1;
        }

        #date-now {
            font-size: 22px;
            font-weight: 400;
            opacity: 0.6;
            margin-top: 10px;
        }

        /* 重新设计的天气 UI */
        .weather-card-new {
            background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            margin-top: 40px;
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weather-temp {
            font-size: 56px;
            font-weight: 300;
        }

        .weather-icon {
            font-size: 50px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .weather-desc {
            font-size: 18px;
            font-weight: 500;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* 第二栏：大面积日历区 */
        .mid-col {
            background: var(--glass-heavy);
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* 第三栏：孕期进度与导航 */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .preg-status {
            background: white;
            padding: 40px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 143, 163, 0.15);
        }

        #weeks-display {
            font-size: 52px;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .nav-item {
            background: var(--glass-heavy);
            padding: 25px 15px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-main);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-item:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        .nav-item div { font-size: 32px; margin-bottom: 5px; }
        .nav-item span { font-size: 14px; font-weight: 600; opacity: 0.7; }

    </style>
</head>
<body>

<div class="container">
    <div class="left-col">
        <div>
            <div id="time-now">00:00</div>
            <div id="date-now">Loading...</div>
        </div>

        <div class="weather-card-new">
            <div class="weather-info">
                <div class="weather-icon" id="w-icon">☀️</div>
                <div class="weather-temp">24°</div>
            </div>
            <div class="weather-desc">Sydney · 晴朗</div>
            <div style="font-size: 14px; opacity: 0.5; margin-top: 10px;">空气质量：优 (22)</div>
        </div>
    </div>

    <div class="mid-col">
        <iframe src="https://calendar.google.com/calendar/embed?mode=AGENDA&ctz=Australia/Sydney&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0&hl=en_GB"></iframe>
    </div>

    <div class="right-col">
        <div class="preg-status">
            <span id="weeks-display">--w --d</span>
            <div style="margin-top: 10px; font-size: 18px; color: #666;" id="days-total">Counting...</div>
            <div style="font-size: 14px; opacity: 0.4; margin-top: 15px;" id="edd-date">EDD: --</div>
        </div>

        <div class="nav-grid">
            <a href="https://gemini.google.com" target="_blank" class="nav-item"><div>✨</div><span>Gemini</span></a>
            <a href="https://chat.openai.com" target="_blank" class="nav-item"><div>🤖</div><span>ChatGPT</span></a>
            <a href="https://192.168.0.73:5001/" target="_blank" class="nav-item"><div>💾</div><span>NAS</span></a>
            <a href="https://mail.google.com" target="_blank" class="nav-item"><div>📧</div><span>Gmail</span></a>
        </div>
    </div>
</div>

<script>
    function update() {
        const now = new Date();
        
        // 时间日期
        document.getElementById("time-now").innerText = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById("date-now").innerText = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

        // IVF 逻辑
        const transfer = new Date("2026-02-05T09:00:00+11:00");
        const baseDays = 19; 
        const diffDays = Math.floor((now - transfer) / (1000 * 60 * 60 * 24));
        const totalDays = baseDays + diffDays;

        const weeks = Math.floor(totalDays / 7);
        const days = totalDays % 7;
        const edd = new Date(transfer);
        edd.setDate(edd.getDate() + 261);

        document.getElementById("weeks-display").innerText = `${weeks}w ${days}d`;
        document.getElementById("days-total").innerText = `第 ${totalDays} 天 · 准妈妈加油`;
        document.getElementById("edd-date").innerText = `预产期: ${edd.toLocaleDateString('zh-CN')}`;

        // 模拟天气更新逻辑 (你可以根据时间改变图标)
        const hour = now.getHours();
        const icon = (hour > 6 && hour < 18) ? "☀️" : "🌙";
        document.getElementById("w-icon").innerText = icon;
    }

    update();
    setInterval(update, 30000);
</script>

</body>
</html>
