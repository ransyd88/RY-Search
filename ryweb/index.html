<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RY Home OS</title>
    <style>
        :root {
            --accent: #ff8fa3; 
            --glass: rgba(255, 255, 255, 0.35);
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            background: var(--bg-gradient);
            overflow: hidden;
            color: #1d1d1f;
        }

        .main-container {
            width: 96vw;
            max-width: 1500px;
            height: 88vh;
            display: grid;
            grid-template-columns: 380px 1fr 380px;
            gap: 25px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 55px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }

        /* 统一卡片 */
        .card {
            background: var(--glass);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
        }

        /* 左栏：时钟与天气 */
        .left-panel { display: flex; flex-direction: column; justify-content: space-between; }
        #clock { font-size: 100px; font-weight: 200; letter-spacing: -5px; margin: 0; }
        #date { font-size: 20px; opacity: 0.5; margin: -10px 0 30px 5px; }
        
        .weather-info { text-align: left; }
        .temp { font-size: 45px; font-weight: 300; margin: 10px 0; }

        /* 中栏：日历 (核心优化) */
        .calendar-panel {
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            overflow: hidden;
            border-radius: 45px;
        }
        .calendar-frame {
            width: 100%;
            height: calc(100% + 50px); /* 稍微拉高以隐藏底部的 Google Logo */
            margin-top: -10px;
            border: none;
            filter: contrast(0.85) saturate(0.8);
        }

        /* 右栏：孕期与捷径 */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .preg-card { text-align: center; background: white; padding: 40px 20px; }
        #weeks-val { font-size: 58px; font-weight: 800; color: var(--accent); display: block; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nav-item {
            background: var(--glass);
            padding: 25px 10px;
            border-radius: 30px;
            text-decoration: none;
            color: #333;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }
        .nav-item:hover { transform: translateY(-5px); background: white; }
        .nav-item div { font-size: 30px; margin-bottom: 8px; }

        .motto { flex-grow: 1; font-size: 15px; line-height: 1.8; color: #555; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-panel">
        <div>
            <h1 id="clock">00:00</h1>
            <div id="date">Loading...</div>
        </div>
        <div class="card weather-info">
            <div style="font-size: 50px;">☀️</div>
            <div class="temp">24°C</div>
            <div style="font-size: 18px; opacity: 0.7;">Sydney · 晴朗</div>
            <div style="font-size: 13px; opacity: 0.4; margin-top: 15px;">空气优 · 适合带 Toffee 散步 🐾</div>
        </div>
    </div>

    <div class="calendar-panel">
        <iframe class="calendar-frame" 
                src="https://calendar.google.com/calendar/embed?mode=AGENDA&src=ransyd88%40gmail.com&ctz=Australia%2FSydney&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0&color=%23FF8FA3">
        </iframe>
    </div>

    <div class="right-panel">
        <div class="card preg-card">
            <span id="weeks-val">--w --d</span>
            <div id="total-days" style="font-size: 18px; color: #888; margin-top: 5px;"></div>
            <div id="edd-val" style="font-size: 12px; opacity: 0.4; margin-top: 20px;"></div>
        </div>

        <div class="nav-grid">
            <a href="https://gemini.google.com" target="_blank" class="nav-item"><div>✨</div><span>Gemini</span></a>
            <a href="https://chat.openai.com" target="_blank" class="nav-item"><div>🤖</div><span>ChatGPT</span></a>
            <a href="https://mail.google.com" target="_blank" class="nav-item"><div>📧</div><span>Gmail</span></a>
            <a href="https://192.168.0.73:5001/" target="_blank" class="nav-item"><div>💾</div><span>NAS</span></a>
        </div>

        <div class="card motto">
            <strong>💡 温馨提醒:</strong><br>
            • 检查 Yanni 的产检预约<br>
            • GLA45S AMG 记得加 98 号油 ⛽<br>
            • 给 AXC 公司的税务留点时间<br>
            • 别忘了 Toffee 的零食 🐶
        </div>
    </div>
</div>

<script>
    function updateApp() {
        const now = new Date();
        // 更新时钟
        document.getElementById("clock").innerText = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById("date").innerText = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

        // IVF 怀孕周期逻辑
        const transfer = new Date("2026-02-05T09:00:00+11:00");
        const baseDays = 19; 
        const diffDays = Math.floor((now - transfer) / (1000 * 60 * 60 * 24));
        const totalDays = baseDays + diffDays;
        const weeks = Math.floor(totalDays / 7);
        const days = totalDays % 7;
        const edd = new Date(transfer);
        edd.setDate(edd.getDate() + 261);

        document.getElementById("weeks-val").innerText = `${weeks}w ${days}d`;
        document.getElementById("total-days").innerText = `第 ${totalDays} 天 · 伴你同行`;
        document.getElementById("edd-val").innerText = `预产期 (EDD): ${edd.toLocaleDateString('zh-CN')}`;
    }

    updateApp();
    setInterval(updateApp, 60000);
</script>

</body>
</html>
