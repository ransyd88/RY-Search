<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RY Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff8fa3; 
            --glass: rgba(255, 255, 255, 0.4);
            --card-radius: 35px;
            --gap: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 100%);
            color: #1d1d1f;
            overflow: hidden;
        }

        /* 核心比例控制：左右固定 350px，中间自适应 */
        .dashboard-layout {
            width: 96vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 350px 1fr 350px; 
            grid-template-rows: 1fr;
            gap: var(--gap);
            padding: var(--gap);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 列容器：强制内部卡片撑满高度 */
        .col {
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            height: 100%;
        }

        .card {
            background: var(--glass);
            border-radius: var(--card-radius);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            position: relative;
        }

        /* 左栏比例：时间(自适应) + 天气(固定) */
        .time-card { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        #clock { font-size: 90px; font-weight: 100; letter-spacing: -5px; line-height: 1; }
        #date { font-size: 20px; opacity: 0.5; margin-top: 10px; }
        
        .weather-card { height: 280px; } /* 固定高度保证对齐 */

        /* 中栏比例：日历(全撑满) */
        .main-card { flex: 1; padding: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 25px; }

        /* 右栏比例：孕期(固定) + 导航(固定) + 提示(自适应) */
        .preg-card { height: 220px; text-align: center; background: white; }
        #weeks-display { font-size: 52px; font-weight: 800; color: var(--accent); }
        
        .nav-card { height: 200px; padding: 20px; }
        .nav-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            gap: 12px; 
            height: 100%; 
        }
        .nav-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            text-decoration: none;
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        .nav-item:hover { background: white; transform: translateY(-3px); }

        .note-card { flex: 1; font-size: 14px; line-height: 1.8; color: #555; }

    </style>
</head>
<body ondblclick="toggleFS()">

<div class="dashboard-layout">
    <div class="col">
        <div class="card time-card">
            <h1 id="clock">00:00</h1>
            <div id="date">Loading...</div>
        </div>
        <div class="card weather-card">
            <a class="weatherwidget-io" href="https://forecast7.com/en/n33_74150_98/norwest/" data-label_1="NORWEST" data-label_2="SYDNEY" data-icons="Climacons Animated" data-mode="Current" data-theme="pure">WEATHER</a>
            <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
        </div>
    </div>

    <div class="col">
        <div class="card main-card">
            <iframe src="https://calendar.google.com/calendar/embed?mode=AGENDA&src=ransyd88%40gmail.com&ctz=Australia/Sydney&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0&hl=zh_CN&color=%23FF8FA3"></iframe>
        </div>
    </div>

    <div class="col">
        <div class="card preg-card">
            <span id="weeks-display">--w --d</span>
            <div id="baby-info" style="font-size: 14px; color: #7f8c8d; margin-top: 10px;">同步中...</div>
            <div id="edd-date" style="font-size: 11px; opacity: 0.3; margin-top: 20px;"></div>
        </div>

        <div class="card nav-card">
            <div class="nav-grid">
                <a href="https://gemini.google.com" target="_blank" class="nav-item"><div>✨</div><span>Gemini</span></a>
                <a href="https://chat.openai.com" target="_blank" class="nav-item"><div>🤖</div><span>ChatGPT</span></a>
                <a href="https://mail.google.com" target="_blank" class="nav-item"><div>📧</div><span>Gmail</span></a>
                <a href="https://192.168.0.73:5001/" target="_blank" class="nav-item"><div>💾</div><span>NAS</span></a>
            </div>
        </div>

        <div class="card note-card">
            <strong>🏠 Norwest 生活助手</strong><br>
            • 检查 Yanni 的产检预约<br>
            • GLA 45S AMG 加 98 号油 ⛽<br>
            • Toffee 的药和零食 🐶<br>
            • AXC 公司税务整理
        </div>
    </div>
</div>

<script>
    function update() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById("date").innerText = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

        const transfer = new Date("2026-02-05T09:00:00+11:00");
        const baseDays = 19; 
        const diffDays = Math.floor((now - transfer) / (1000 * 60 * 60 * 24));
        const totalDays = baseDays + diffDays;
        const weeks = Math.floor(totalDays / 7);
        const days = totalDays % 7;
        const edd = new Date(transfer);
        edd.setDate(edd.getDate() + 261);

        document.getElementById("weeks-display").innerText = `${weeks}w ${days}d`;
        document.getElementById("edd-date").innerText = `EDD: ${edd.toLocaleDateString('zh-CN')}`;
        
        const growth = {
            7: "宝宝像蓝莓，心脏有力跳动中",
            8: "宝宝像覆盆子，手脚萌芽了",
            9: "宝宝像樱桃，正在练习翻滚",
            10: "宝宝像金桔，器官基本成型",
        };
        document.getElementById("baby-info").innerText = `第 ${totalDays} 天 · ${growth[weeks] || "茁壮成长中"}`;
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    update();
    setInterval(update, 60000);
</script>
</body>
</html>
