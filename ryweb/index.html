<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RY Premium Dashboard</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.25);
            --glass-heavy: rgba(255, 255, 255, 0.4);
            --text-main: #2c3e50;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Helvetica Neue', 'Arial', sans-serif;
            /* 渐变背景更柔和大气 */
            background: linear-gradient(45deg, #fce4ec 0%, #e1f5fe 50%, #f3e5f5 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90vw;
            max-width: 1200px;
            height: 80vh;
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 24px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
        }

        /* 左侧：时间与天气 */
        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #time-display {
            font-size: 80px;
            font-weight: 200;
            color: var(--text-main);
            margin: 0;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
        }

        #date-display {
            font-size: 20px;
            opacity: 0.6;
            margin-top: -10px;
            margin-bottom: 30px;
        }

        .weather-box {
            flex-grow: 1;
            background: var(--glass-heavy);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 解决下载问题的方案：使用 iframe 嵌入并隐藏滚动条 */
        .weather-frame {
            width: 100%;
            height: 100%;
            border: none;
            filter: contrast(90%) brightness(105%);
        }

        /* 右侧：功能与进度 */
        .right-panel {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
        }

        .pregnancy-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.3));
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
        }

        #weeks-text {
            font-size: 48px;
            font-weight: 700;
            color: #ff8fa3;
            margin-bottom: 5px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .nav-btn {
            background: var(--glass-heavy);
            padding: 20px 10px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s;
            text-align: center;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            background: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .nav-btn div { font-size: 28px; margin-bottom: 8px; }
        .nav-btn span { font-size: 13px; font-weight: 500; opacity: 0.8; }

        .calendar-box {
            background: var(--glass-heavy);
            border-radius: 30px;
            overflow: hidden;
            height: 100%;
        }

        .calendar-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .small-info { font-size: 14px; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div>
            <h1 id="time-display">00:00</h1>
            <div id="date-display">Loading...</div>
        </div>
        
        <div class="weather-box">
            <iframe class="weather-frame" src="https://wttr.in/Sydney?1&m&n&q&T"></iframe>
        </div>
    </div>

    <div class="right-panel">
        <div class="pregnancy-card">
            <div id="weeks-text">--w --d</div>
            <div style="font-size: 18px; color: #7f8c8d;" id="days-total">Counting...</div>
            <div class="small-info" id="edd-text">EDD: --</div>
        </div>

        <div class="calendar-box">
            <iframe class="calendar-iframe" src="https://calendar.google.com/calendar/embed?mode=AGENDA&ctz=Australia/Sydney&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0"></iframe>
        </div>

        <div class="status-grid">
            <a href="https://gemini.google.com" target="_blank" class="nav-btn">
                <div>✨</div><span>Gemini</span>
            </a>
            <a href="https://chat.openai.com" target="_blank" class="nav-btn">
                <div>🤖</div><span>ChatGPT</span>
            </a>
            <a href="https://192.168.0.73:5001/" target="_blank" class="nav-btn">
                <div>💾</div><span>NAS</span>
            </a>
            <a href="https://mail.google.com" target="_blank" class="nav-btn">
                <div>📧</div><span>Gmail</span>
            </a>
        </div>
    </div>
</div>

<script>
    function updateDashboard() {
        const now = new Date();
        
        // 更新时间 (HH:mm)
        const timeStr = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById("time-display").innerText = timeStr;
        document.getElementById("date-display").innerText = now.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });

        // IVF 逻辑
        const transfer = new Date("2026-02-05T09:00:00+11:00");
        const baseDays = 19; 
        const diffDays = Math.floor((now - transfer) / (1000 * 60 * 60 * 24));
        const totalDays = baseDays + diffDays;

        const weeks = Math.floor(totalDays / 7);
        const days = totalDays % 7;

        const edd = new Date(transfer);
        edd.setDate(edd.getDate() + 261);

        document.getElementById("weeks-text").innerText = `${weeks}w ${days}d`;
        document.getElementById("days-total").innerText = `第 ${totalDays} 天 · 准妈妈加油`;
        document.getElementById("edd-text").innerText = `预产期 (EDD): ${edd.toLocaleDateString('en-AU', { year:'numeric', month:'long', day:'numeric' })}`;
    }

    // 初始化和定时器
    updateDashboard();
    setInterval(updateDashboard, 1000 * 60); // 每分钟更新一次即可，省电且大气
</script>

</body>
</html>
