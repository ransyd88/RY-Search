<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* 光晕 */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(56,189,248,0.4), transparent);
  top: -200px;
  left: -200px;
  filter: blur(120px);
}

body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(168,85,247,0.4), transparent);
  bottom: -200px;
  right: -200px;
  filter: blur(120px);
}

.app {
  width: 420px;
  padding: 30px;
  border-radius: 30px;
  backdrop-filter: blur(40px);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  position: relative;
  z-index: 1;
}

/* 时间 */
.top-bar {
  text-align: center;
  margin-bottom: 25px;
}

#time {
  font-size: 34px;
  font-weight: 600;
}

#date {
  font-size: 14px;
  opacity: 0.7;
}

/* 图标 */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.icon {
  text-align: center;
  padding: 18px;
  border-radius: 18px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.25s ease;
}

.icon div {
  font-size: 26px;
  margin-bottom: 8px;
}

.icon span {
  font-size: 13px;
}

.icon:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 20px rgba(56,189,248,0.4);
}

/* 孕期卡片 */
.pregnancy-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  text-align: center;
}

.pregnancy-title {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 8px;
}

.pregnancy-main {
  font-size: 28px;
  font-weight: 700;
}

.pregnancy-sub {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top-bar">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <div class="grid">
    <a href="https://chat.openai.com" target="_blank" class="icon">
      <div>🤖</div>
      <span>ChatGPT</span>
    </a>

    <a href="https://gemini.google.com" target="_blank" class="icon">
      <div>✨</div>
      <span>Gemini</span>
    </a>

    <a href="https://192.168.0.73:5001/" target="_blank" class="icon">
      <div>💾</div>
      <span>NAS</span>
    </a>

    <a href="https://mail.google.com" target="_blank" class="icon">
      <div>📧</div>
      <span>Gmail</span>
    </a>
  </div>

  <div class="pregnancy-card">
    <div class="pregnancy-title">Yanni Pregnancy</div>
    <div class="pregnancy-main" id="weeks"></div>
    <div class="pregnancy-sub" id="days"></div>
    <div class="pregnancy-sub" id="edd"></div>
  </div>

</div>

<script>
function updateAll() {
  const now = new Date();

  // 时间
  document.getElementById("time").innerText =
    now.toLocaleTimeString("en-AU");
  document.getElementById("date").innerText =
    now.toDateString();

  // IVF移植时间
  const transfer = new Date("2026-02-05T09:00:00+11:00");

  // Day5胚胎 = 2周5天
  const baseDays = 19;

  const diffDays = Math.floor((now - transfer) / (1000*60*60*24));
  const totalDays = baseDays + diffDays;

  const weeks = Math.floor(totalDays / 7);
  const days = totalDays % 7;

  // 预产期
  const edd = new Date(transfer);
  edd.setDate(edd.getDate() + 261);

  document.getElementById("weeks").innerText = weeks + "w " + days + "d";
  document.getElementById("days").innerText = totalDays + " days pregnant";
  document.getElementById("edd").innerText =
    "EDD: " + edd.toDateString();
}

setInterval(updateAll, 1000);
updateAll();
</script>

</body>
</html>
